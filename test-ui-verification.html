<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频库 UI 验证测试</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #0a0a0a;
      color: #fff;
    }
    h1, h2 { color: #4a9eff; }
    .test-section {
      margin: 30px 0;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .song-item {
      padding: 12px;
      margin: 8px 0;
      background: #252525;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .song-item:hover {
      background: #303030;
      transform: translateX(4px);
    }
    .song-name { font-weight: 600; font-size: 14px; }
    .song-artist { color: #999; font-size: 12px; margin-top: 4px; }
    .song-meta { color: #666; font-size: 11px; margin-top: 4px; }
    .playlist-group {
      margin: 20px 0;
      padding: 15px;
      background: #151515;
      border-radius: 6px;
    }
    .playlist-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #4a9eff;
    }
    .test-result {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    .pass { background: #1a3a1a; border-left: 4px solid #4caf50; }
    .fail { background: #3a1a1a; border-left: 4px solid #f44336; }
    .info { background: #1a2a3a; border-left: 4px solid #2196f3; }
    audio {
      width: 100%;
      margin: 10px 0;
    }
    .cover-preview {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 4px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🎵 音频库系统验证测试</h1>

  <div class="test-section">
    <h2>1️⃣ Manifest 自动生成测试</h2>
    <div id="manifest-test"></div>
  </div>

  <div class="test-section">
    <h2>2️⃣ 文件名标签推断测试</h2>
    <div id="tag-parsing-test"></div>
  </div>

  <div class="test-section">
    <h2>3️⃣ 歌单分组显示测试</h2>
    <div id="playlist-grouping-test"></div>
  </div>

  <div class="test-section">
    <h2>4️⃣ 播放功能测试（点击歌曲播放）</h2>
    <div id="playback-test"></div>
    <audio id="test-player" controls></audio>
  </div>

  <div class="test-section">
    <h2>5️⃣ ID3 元数据读取测试</h2>
    <div id="id3-test"></div>
  </div>

  <script type="module">
    import { loadAudioManifest, buildLibrarySongs, groupByPlaylist, parseFileTags, loadSongMetadata } from './js/audio-library.js'

    const results = {
      manifest: [],
      tagParsing: [],
      playlistGrouping: [],
      playback: [],
      id3: []
    }

    // 测试 1: Manifest 加载
    async function testManifest() {
      const container = document.getElementById('manifest-test')
      try {
        const files = await loadAudioManifest()

        if (files.length > 0) {
          results.manifest.push({ pass: true, msg: `✅ 成功加载 ${files.length} 个音频文件` })

          // 检查测试文件
          const testFiles = files.filter(f => f.includes('[lonely]') || f.includes('[healing]') || f.includes('[melancholy]'))
          if (testFiles.length >= 3) {
            results.manifest.push({ pass: true, msg: `✅ 找到 ${testFiles.length} 个带标签的测试文件` })
          } else {
            results.manifest.push({ pass: false, msg: `⚠️ 只找到 ${testFiles.length} 个测试文件` })
          }
        } else {
          results.manifest.push({ pass: false, msg: '❌ 未找到任何音频文件' })
        }
      } catch (error) {
        results.manifest.push({ pass: false, msg: `❌ 加载失败: ${error.message}` })
      }

      container.innerHTML = results.manifest.map(r =>
        `<div class="test-result ${r.pass ? 'pass' : 'fail'}">${r.msg}</div>`
      ).join('')
    }

    // 测试 2: 标签解析
    async function testTagParsing() {
      const container = document.getElementById('tag-parsing-test')
      const testCases = [
        {
          file: '[lonely] Test Artist - Lonely Song.mp3',
          expected: { mood: 'lonely', playlist: '孤独之海', displayName: 'Test Artist - Lonely Song' }
        },
        {
          file: '[healing][pl:Custom Playlist] Healer - Calm Mind.mp3',
          expected: { mood: 'healing', playlist: 'Custom Playlist', displayName: 'Healer - Calm Mind' }
        },
        {
          file: '[melancholy] Sad Singer - 忧伤的歌.mp3',
          expected: { mood: 'melancholy', playlist: '深夜独白', displayName: 'Sad Singer - 忧伤的歌' }
        },
        {
          file: '徐良,阿悄 - 犯贱.mp3',
          expected: { mood: 'unknown', playlist: '未分类', displayName: '徐良,阿悄 - 犯贱' }
        }
      ]

      testCases.forEach(test => {
        const result = parseFileTags(test.file)
        const moodMatch = result.mood === test.expected.mood
        const playlistMatch = result.playlistName === test.expected.playlist
        const displayMatch = result.displayName === test.expected.displayName
        const noTags = !result.displayName.includes('[')

        if (moodMatch && playlistMatch && displayMatch && noTags) {
          results.tagParsing.push({
            pass: true,
            msg: `✅ ${test.file}<br>&nbsp;&nbsp;&nbsp;&nbsp;心情: ${result.mood}, 歌单: ${result.playlistName}, 显示: ${result.displayName}`
          })
        } else {
          results.tagParsing.push({
            pass: false,
            msg: `❌ ${test.file}<br>&nbsp;&nbsp;&nbsp;&nbsp;预期: ${JSON.stringify(test.expected)}<br>&nbsp;&nbsp;&nbsp;&nbsp;实际: mood=${result.mood}, playlist=${result.playlistName}, display=${result.displayName}`
          })
        }
      })

      container.innerHTML = results.tagParsing.map(r =>
        `<div class="test-result ${r.pass ? 'pass' : 'fail'}">${r.msg}</div>`
      ).join('')
    }

    // 测试 3: 歌单分组
    async function testPlaylistGrouping() {
      const container = document.getElementById('playlist-grouping-test')
      try {
        const files = await loadAudioManifest()
        const songs = buildLibrarySongs(files)
        const playlists = groupByPlaylist(songs)

        results.playlistGrouping.push({
          pass: true,
          msg: `✅ 共生成 ${Object.keys(playlists).length} 个歌单`
        })

        let html = ''
        for (const [playlistName, songs] of Object.entries(playlists)) {
          html += `<div class="playlist-group">
            <div class="playlist-title">${playlistName} (${songs.length} 首)</div>`

          songs.slice(0, 3).forEach(song => {
            html += `<div class="song-item">
              <div class="song-name">${song.name}</div>
              <div class="song-artist">${song.artist}</div>
              <div class="song-meta">心情: ${song.mood} | 文件: ${song.fileName}</div>
            </div>`
          })

          if (songs.length > 3) {
            html += `<div style="color: #666; font-size: 12px; margin-top: 8px;">... 还有 ${songs.length - 3} 首</div>`
          }

          html += '</div>'
        }

        container.innerHTML = results.playlistGrouping.map(r =>
          `<div class="test-result ${r.pass ? 'pass' : 'fail'}">${r.msg}</div>`
        ).join('') + html
      } catch (error) {
        results.playlistGrouping.push({ pass: false, msg: `❌ 分组失败: ${error.message}` })
        container.innerHTML = results.playlistGrouping.map(r =>
          `<div class="test-result fail">${r.msg}</div>`
        ).join('')
      }
    }

    // 测试 4: 播放功能
    async function testPlayback() {
      const container = document.getElementById('playback-test')
      const player = document.getElementById('test-player')

      try {
        const files = await loadAudioManifest()
        const songs = buildLibrarySongs(files)

        // 测试中文文件名和空格
        const testSongs = songs.filter(s =>
          s.fileName.includes('忧伤') ||
          s.fileName.includes('Lonely Song') ||
          s.fileName.includes('徐良')
        ).slice(0, 5)

        if (testSongs.length === 0) {
          results.playback.push({ pass: false, msg: '❌ 未找到测试歌曲' })
        } else {
          results.playback.push({
            pass: true,
            msg: `✅ 找到 ${testSongs.length} 首测试歌曲，点击下方歌曲测试播放`
          })
        }

        let html = results.playback.map(r =>
          `<div class="test-result ${r.pass ? 'pass' : 'fail'}">${r.msg}</div>`
        ).join('')

        testSongs.forEach(song => {
          html += `<div class="song-item" onclick="playSong('${song.src}', '${song.name}')">
            <div class="song-name">▶️ ${song.name}</div>
            <div class="song-artist">${song.artist}</div>
            <div class="song-meta">文件: ${song.fileName}</div>
          </div>`
        })

        container.innerHTML = html

        window.playSong = (src, name) => {
          // 确保 URL 编码正确
          const encodedSrc = src.split('/').map(part =>
            part === '' ? '' : encodeURIComponent(decodeURIComponent(part))
          ).join('/')

          player.src = encodedSrc
          player.play().then(() => {
            container.insertAdjacentHTML('beforeend',
              `<div class="test-result pass">✅ 正在播放: ${name}</div>`
            )
          }).catch(err => {
            container.insertAdjacentHTML('beforeend',
              `<div class="test-result fail">❌ 播放失败: ${err.message}</div>`
            )
          })
        }
      } catch (error) {
        container.innerHTML = `<div class="test-result fail">❌ 测试失败: ${error.message}</div>`
      }
    }

    // 测试 5: ID3 元数据
    async function testID3() {
      const container = document.getElementById('id3-test')
      container.innerHTML = '<div class="test-result info">⏳ 正在读取 ID3 元数据...</div>'

      try {
        const files = await loadAudioManifest()
        const songs = buildLibrarySongs(files)

        // 测试前 3 首歌的 ID3
        const testSongs = songs.slice(0, 3)

        for (const song of testSongs) {
          const originalName = song.name
          const originalArtist = song.artist
          const originalCover = song.coverUrl

          await loadSongMetadata(song)

          let html = `<div class="test-result ${song.coverUrl ? 'pass' : 'info'}">
            <strong>${song.fileName}</strong><br>
            &nbsp;&nbsp;歌名: ${originalName} → ${song.name} ${song.name !== originalName ? '✅ 已更新' : ''}<br>
            &nbsp;&nbsp;艺术家: ${originalArtist} → ${song.artist} ${song.artist !== originalArtist ? '✅ 已更新' : ''}<br>
            &nbsp;&nbsp;封面: ${song.coverUrl ? '✅ 已读取' : '⚠️ 无封面'}
          </div>`

          if (song.coverUrl) {
            html += `<img src="${song.coverUrl}" class="cover-preview" alt="封面">`
          }

          container.insertAdjacentHTML('beforeend', html)
        }

        const withCovers = testSongs.filter(s => s.coverUrl).length
        if (withCovers > 0) {
          results.id3.push({ pass: true, msg: `✅ ${withCovers}/${testSongs.length} 首歌读取到封面` })
        } else {
          results.id3.push({ pass: true, msg: `⚠️ 测试的歌曲文件中没有内嵌封面（这是正常的）` })
        }
      } catch (error) {
        container.innerHTML = `<div class="test-result fail">❌ ID3 读取失败: ${error.message}</div>`
      }
    }

    // 运行所有测试
    async function runAllTests() {
      await testManifest()
      await testTagParsing()
      await testPlaylistGrouping()
      await testPlayback()
      await testID3()
    }

    runAllTests()
  </script>
</body>
</html>
