<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAIA - 情绪音乐</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/glass.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/background.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="page-loading">
  <!-- 流体背景 -->
  <div class="fluid-bg" aria-hidden="true">
    <div class="fluid-bg__blob fluid-bg__blob--1"></div>
    <div class="fluid-bg__blob fluid-bg__blob--2"></div>
    <div class="fluid-bg__blob fluid-bg__blob--3"></div>
    <div class="fluid-bg__blob fluid-bg__blob--4"></div>
  </div>

  <!-- 导航栏 -->
  <header class="glass-nav" id="mainNav">
    <div class="nav-inner container">
      <a href="/index.html" class="nav-logo">GAIA</a>
      <nav class="nav-links" id="navLinks">
        <a href="/index.html" class="nav-link" data-page="index">首页</a>
        <a href="/pages/ai.html" class="nav-link" data-page="ai">AI 板块</a>
        <a href="/pages/music.html" class="nav-link" data-page="music">情绪音乐</a>
        <a href="/pages/game-art.html" class="nav-link" data-page="game-art">第九艺术</a>
        <a href="/pages/words.html" class="nav-link" data-page="words">伤感文字</a>
        <a href="/pages/kook.html" class="nav-link" data-page="kook">社区</a>
        <a href="/pages/about.html" class="nav-link" data-page="about">关于</a>
      </nav>
      <button class="nav-hamburger" id="navHamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- 移动端全屏菜单 -->
  <div class="mobile-menu glass-modal-overlay" id="mobileMenu">
    <div class="mobile-menu__inner">
      <a href="/index.html" class="mobile-menu__link">首页</a>
      <a href="/pages/ai.html" class="mobile-menu__link">AI 板块</a>
      <a href="/pages/music.html" class="mobile-menu__link">情绪音乐</a>
      <a href="/pages/game-art.html" class="mobile-menu__link">第九艺术</a>
      <a href="/pages/words.html" class="mobile-menu__link">伤感文字</a>
      <a href="/pages/kook.html" class="mobile-menu__link">社区</a>
      <a href="/pages/about.html" class="mobile-menu__link">关于</a>
    </div>
    <button class="mobile-menu__close" id="mobileMenuClose" aria-label="关闭">✕</button>
  </div>

  <!-- ============================
       页面内容
       ============================ -->
  <main class="main-content">

    <!-- 页面 Hero 区（约 35vh） -->
    <section class="page-hero">
      <h1 class="page-hero__title anim-fade-in-up">情绪音乐</h1>
      <p class="page-hero__subtitle anim-fade-in-up" style="animation-delay: 0.3s">
        深夜的旋律，是情绪最柔软的容器
      </p>
    </section>

    <div class="music-content container">

      <!-- ============================
           区域 A：当前播放
           ============================ -->
      <section class="music-player glass-card-lg scroll-reveal">
        <div class="music-player__art" id="playerArt"></div>
        <div class="music-player__info">
          <h2 class="music-player__title" id="playerTitle">未选择歌曲</h2>
          <p class="music-player__artist" id="playerArtist">点击下方歌曲开始播放</p>
          <p class="music-player__mood" id="playerMood"></p>
          <div class="music-player__progress">
            <div class="music-player__progress-bar">
              <div class="music-player__progress-fill" id="progressFill"></div>
            </div>
            <div class="music-player__time">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>
          </div>
          <div class="music-player__controls">
            <button class="music-player__btn music-player__btn--play" id="playBtn" aria-label="播放">
              <span class="music-player__btn-icon" id="playIcon">▶</span>
            </button>
          </div>
        </div>
      </section>

      <!-- ============================
           区域 B：歌单网格
           ============================ -->
      <section class="music-playlists scroll-reveal">
        <h2 class="music-section-title">精选歌单</h2>
        <div class="music-playlists__grid" id="playlistsGrid">
        </div>
      </section>

      <!-- ============================
           区域 C：心情推荐
           ============================ -->
      <section class="music-moods scroll-reveal">
        <h2 class="music-section-title">心情推荐</h2>
        <div class="music-moods__tags">
          <button class="glass-tag music-mood-tag active" data-mood="all">全部</button>
          <button class="glass-tag music-mood-tag" data-mood="melancholy">忧郁</button>
          <button class="glass-tag music-mood-tag" data-mood="calm">平静</button>
          <button class="glass-tag music-mood-tag" data-mood="healing">治愈</button>
          <button class="glass-tag music-mood-tag" data-mood="lonely">孤独</button>
        </div>
        <div class="music-moods__grid" id="moodsGrid">
          <!-- 由 JS 动态渲染 -->
        </div>
      </section>

    </div>

    <!-- ============================
         底部 Footer
         ============================ -->
    <footer class="footer">
      <div class="glass-divider"></div>
      <div class="footer__inner">
        <p class="footer__copy">&copy; 2025 GAIA &middot; Crafted with emotion</p>
        <nav class="footer__links">
          <a href="/pages/ai.html">AI</a>
          <a href="/pages/music.html">音乐</a>
          <a href="/pages/game-art.html">游戏</a>
          <a href="/pages/words.html">文字</a>
          <a href="/pages/about.html">关于</a>
        </nav>
      </div>
    </footer>
  </main>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
